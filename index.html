body{font-family:'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;background:#f4f5f7;color:#1f2328;

.gate{background:#fff;border:1px solid #e3e5e8;border-radius:16px;padding:38px 34px;max-width:380px;width:100%;

button{padding:11px 18px;border:none;border-radius:10px;background:#0f172a;color:#fff;font-size:14px;
       font-weight:700;cursor:pointer;white-space:nowrap}
button:disabled{opacity:.5;cursor:wait}
#eye{background:#fff;border:1.5px solid #e3e5e8;color:#1f2328;font-size:16px;padding:0 12px}
.msg{margin-top:14px;font-size:13px;min-height:18px}
.msg.err{color:#c0392b}
.msg.busy{color:#6a7280}
.hint{margin-top:4px;color:#9aa1ab;font-size:11.5px;min-height:14px}
.foot{margin-top:20px;color:#b6bcc6;font-size:11.5px}

const ITER = 600000;
const $ = id => document.getElementById(id);

function b64bytes(s){
  const bin = atob(s), a = new Uint8Array(bin.length);
  for (let i=0;i<bin.length;i++) a[i] = bin.charCodeAt(i);
  return a;
}
async function tryOpen(pw, silent){
  const msg = $('msg'), btn = $('go');
  if (!pw){ if(!silent){ msg.className='msg err'; msg.textContent='비밀번호를 입력해 주세요.'; } return; }
  btn.disabled = true;
  msg.className='msg busy'; msg.textContent='확인 중…';
  try{
    // 입력 기기·브라우저에 따라 한글이 NFC/NFD로 다르게 인코딩될 수 있어 항상 NFC로 통일
    const pwNorm = pw.normalize('NFC');
    const all = b64bytes(PAYLOAD);
    const salt = all.slice(0,16), iv = all.slice(16,28), ct = all.slice(28);
    const mat = await crypto.subtle.importKey('raw', new TextEncoder().encode(pwNorm), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey({name:'PBKDF2', salt, iterations:ITER, hash:'SHA-256'},
                  mat, {name:'AES-GCM', length:256}, false, ['decrypt']);
    const plain = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ct);
    sessionStorage.setItem('qhs_gate', pw);
    const html = new TextDecoder().decode(plain);
    document.open(); document.write(html); document.close();
  }catch(e){
    sessionStorage.removeItem('qhs_gate');
    btn.disabled = false;
    msg.className='msg err';
    msg.textContent = silent ? '' : '비밀번호가 올바르지 않습니다.';
    if(!silent){ $('pw').select(); }
  }
}
$('go').addEventListener('click', ()=>tryOpen($('pw').value.trim(), false));
$('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') tryOpen($('pw').value.trim(), false); });
$('eye').addEventListener('click', ()=>{
  const pw = $('pw');
  pw.type = pw.type === 'password' ? 'text' : 'password';
  $('eye').textContent = pw.type === 'password' ? '👁' : '🙈';
});
$('pw').addEventListener('input', ()=>{
  const n = $('pw').value.trim().length;
  $('hint').textContent = n ? (n + '자 입력됨') : '';
});
const saved = sessionStorage.getItem('qhs_gate');
if (saved) tryOpen(saved, true);
</script>
